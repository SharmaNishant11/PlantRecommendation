<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PlantSense Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1> PlantSense Dashboard</h1>

<div class="container">

<div class="card">
<h2>Sensor Inputs</h2>

<label>Temperature</label>
<input type="number" id="temperature" value="30">

<label>Humidity</label>
<input type="number" id="humidity" value="60">

<label>Soil Moisture</label>
<input type="number" id="moisture" value="300">

<label>Light Intensity</label>
<input type="number" id="light" value="20000">

<button onclick="runRec()">Get Recommendations</button>
</div>

<div class="card">
<h2>Recommended Plants</h2>
<ul id="results"></ul>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
